<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00bcd4">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Class Routine</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --accent: #00bcd4;
            --danger: #ff5252;
            --success: #66bb6a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 { margin-bottom: 5px; text-align: center; }
        p.subtitle { color: #888; margin-bottom: 30px; font-style: italic; }

        /* The Big Countdown Timer */
        #hero-timer {
            background: linear-gradient(145deg, #252525, #1a1a1a);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            text-align: center;
            margin-bottom: 40px;
            width: 90%;
            max-width: 600px;
            border-left: 5px solid var(--accent);
            display: none; 
        }

        #hero-subject { font-size: 1.5rem; color: var(--accent); font-weight: bold; }
        #hero-title { font-size: 1.2rem; color: #fff; margin-bottom: 10px; } 
        #hero-countdown { font-size: 3rem; margin: 10px 0; font-family: monospace; }
        #hero-date { color: #aaa; }

        /* Exam List Grid */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        .exam-card {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #333;
            position: relative;
            transition: transform 0.2s;
        }

        .exam-card:hover { transform: translateY(-5px); border-color: var(--accent); }

        .card-header { display: flex; justify-content: space-between; align-items: center; }
        .course-code { font-weight: bold; font-size: 1.2rem; color: var(--accent); }
        
        .exam-title { 
            font-size: 1.1rem; 
            color: #fff; 
            margin: 8px 0; 
            font-weight: 500; 
        }

        .exam-date { color: #888; font-size: 0.9rem; margin-bottom: 10px; }
        .time-remaining { color: #ddd; font-weight: 600; font-family: monospace; font-size: 1.1rem; }
        
        .notification-banner {
            background-color: var(--accent);
            color: black;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none; 
            cursor: pointer;
        }
        
        .footer-note { margin-top: 50px; color: #555; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="notification-req" class="notification-banner" onclick="requestNotificationPermission()">
        ⚠️ Click to enable Class Alerts (Notifies 30 mins before class)
    </div>

    <h1>Daily Heads-Up</h1>
    <p class="subtitle" id="current-day-label">Loading schedule...</p>

    <div id="hero-timer">
        <div id="hero-header">NEXT CLASS</div>
        <div id="hero-subject">Loading...</div>
        <div id="hero-title"></div> 
        <div id="hero-countdown">00d 00h 00m 00s</div>
        <div id="hero-date">...</div>
    </div>

    <div class="grid-container" id="exam-grid"></div>

    <div class="footer-note">Strict Daily Routine Active</div>

<script>
    // --- 0. SINGLE INSTANCE ENFORCER ---
    const channel = new BroadcastChannel('app_instance_channel');

    // Tell other tabs we just opened
    channel.postMessage('new_tab_opened');

    // Listen for other tabs
    channel.onmessage = (event) => {
        if (event.data === 'new_tab_opened') {
            // We are the original tab. Tell the new tab we exist.
            channel.postMessage('already_open');
        } 
        if (event.data === 'already_open') {
            // We are the duplicate tab. Show an error or close.
            alert('Routine is already open in another tab. Closing this duplicate.');
            
            // Attempt to close the tab
            window.close();
            
            // Fallback UI if the browser blocks window.close()
            document.body.innerHTML = `
                <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; text-align:center;">
                    <h1 style="color: var(--danger);">Duplicate Tab Blocked</h1>
                    <p>The class routine is already open in another tab.</p>
                    <p style="color: #888;">Please close this tab to save memory.</p>
                </div>
            `;
        }
    };


    // --- 1. ROUTINE DATA ENTRY ---
    const routine = [
        // Saturday (6)
        { day: 6, start: "10:30", code: "CSE 2206", title: "OOAD Lab-1 (MSM)", room: "Lab-1" },
        { day: 6, start: "14:20", code: "CSE 2207", title: "Microprocessor (MR)", room: "Room 340" },
        { day: 6, start: "15:10", code: "CSE 2205", title: "OOAD (MSM)", room: "Room 340" },

        // Sunday (0)
        { day: 0, start: "08:50", code: "CSE 2211", title: "Math (MAI)", room: "Room 341" },
        { day: 0, start: "09:40", code: "CSE 2203", title: "DBMS (MKN)", room: "Room 341" },
        { day: 0, start: "10:30", code: "CSE 2204", title: "DBMS Lab-2 (MKN)", room: "Lab-2" },
        { day: 0, start: "13:30", code: "CSE 2201", title: "Algo (MSH)", room: "Room 340" },
        { day: 0, start: "14:20", code: "CSE 2202", title: "Algo Lab-1 (MSH)", room: "Lab-1" },

        // Monday (1)
        { day: 1, start: "08:50", code: "CSE 2201", title: "Algo (MSH)", room: "Room 338" },
        { day: 1, start: "09:40", code: "CSE 2203", title: "DBMS (MKN)", room: "Room 338" },
        { day: 1, start: "10:30", code: "CSE 2202", title: "Algo Lab (MSH)", room: "Room 2" },
        { day: 1, start: "13:30", code: "CSE 2204", title: "DBMS Lab-1 (MKN)", room: "Lab-1" },
        { day: 1, start: "15:10", code: "CSE 2211", title: "Math (MAI)", room: "Room 338" },

        // Tuesday (2)
        { day: 2, start: "08:50", code: "CSE 2201", title: "Algo (MSH)", room: "Room 338" },
        { day: 2, start: "09:40", code: "CSE 2203", title: "DBMS (MKN)", room: "Room 338" },
        { day: 2, start: "10:30", code: "CSE 2209", title: "Data Comm (MB)", room: "Room 338" },
        { day: 2, start: "13:30", code: "CSE 2208", title: "Assembly Lab-1 (MHR)", room: "Lab-1" },
        { day: 2, start: "14:20", code: "CSE 2207", title: "Microprocessor (MR)", room: "Room 338" },

        // Wednesday (3)
        { day: 3, start: "08:50", code: "CSE 2211", title: "Math (MAI)", room: "Room 338" },
        { day: 3, start: "09:40", code: "CSE 2205", title: "OOAD (MSM)", room: "Room 338" },
        { day: 3, start: "10:30", code: "CSE 2209", title: "Data Comm (MB)", room: "Room 338" },
        { day: 3, start: "11:20", code: "CSE 2207", title: "Microprocessor (MR)", room: "Room 338" },
        { day: 3, start: "13:30", code: "CSE 2210", title: "Data Comm Lab-3 (MB)", room: "Lab-3" }
    ];

    const daysMap = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];

    const flavorTexts = [
        "Are you crazy? Classes are OVER, MAN!",
        " GO TOUCH SOME GRASS, BRO!",
        "I Think you opened the wrong app.", 
        "Insert no one here gif. 😆"
    ];

    let currentDailyClasses = [];
    let flavorLocked = "";

    // --- 2. ENGINE (DAILY ONLY) ---
    function getTodayClasses() {
        const now = new Date();
        const currentDay = now.getDay();
        
        let occurrences = [];
        
        routine.forEach(cls => {
            // Only care if the class is scheduled for the current day
            if (cls.day === currentDay) {
                const [hours, minutes] = cls.start.split(':').map(Number);
                let classDate = new Date(now);
                classDate.setHours(hours, minutes, 0, 0);
                
                // Only push it if the class hasn't happened yet today
                if (classDate > now) {
                    occurrences.push({ ...cls, nextDate: classDate });
                }
            }
        });
        
        return occurrences.sort((a, b) => a.nextDate - b.nextDate);
    }

    // --- 3. RENDERING ---
    function render() {
        const now = new Date();
        currentDailyClasses = getTodayClasses();
        const grid = document.getElementById('exam-grid');
        grid.innerHTML = '';
        
        document.getElementById('current-day-label').innerText = `${daysMap[now.getDay()]}'s Schedule`;

        const heroTimer = document.getElementById('hero-timer');
        heroTimer.style.display = "block";

        // NO CLASSES LEFT TODAY STATE
        if (currentDailyClasses.length === 0) {
            if(!flavorLocked) {
                flavorLocked = flavorTexts[Math.floor(Math.random() * flavorTexts.length)];
            }
            
            document.getElementById('hero-header').innerText = "STATUS: IDLE";
            document.getElementById('hero-subject').innerText = "GG WP";
            document.getElementById('hero-title').innerText = flavorLocked;
            document.getElementById('hero-countdown').innerText = "- - -";
            document.getElementById('hero-date').innerText = "No more classes today.";
            heroTimer.removeAttribute('data-target');
            return;
        }

        // RESET FLAVOR LOCK IF WE HAVE CLASSES (e.g. at midnight)
        flavorLocked = "";

        // RENDER HERO CLASS
        const heroClass = currentDailyClasses[0];
        const timeOptions = { hour: '2-digit', minute:'2-digit' };
        
        document.getElementById('hero-header').innerText = "NEXT UP";
        document.getElementById('hero-subject').innerText = heroClass.code;
        document.getElementById('hero-title').innerText = `${heroClass.title} - ${heroClass.room}`;
        document.getElementById('hero-date').innerText = `Today at ${heroClass.nextDate.toLocaleTimeString([], timeOptions)}`;
        heroTimer.dataset.target = heroClass.nextDate;

        // RENDER THE REST OF THE DAY IN GRID
        currentDailyClasses.slice(1).forEach(cls => {
            const card = document.createElement('div');
            card.className = `exam-card`;
            
            card.innerHTML = `
                <div class="card-header">
                    <span class="course-code">${cls.code}</span>
                </div>
                <div class="exam-title">${cls.title}</div>
                <div class="exam-date">Today at ${cls.nextDate.toLocaleTimeString([], timeOptions)} | ${cls.room}</div>
                <div class="time-remaining" data-target="${cls.nextDate}">...</div>
            `;
            grid.appendChild(card);
        });
    }

    // --- 4. LOGIC & TIMERS ---
    function updateTimers() {
        const now = new Date();
        let forceReload = false;
        
        // Grid Timers
        document.querySelectorAll('.time-remaining').forEach(el => {
            const target = new Date(el.dataset.target);
            const diff = target - now;
            
            if (diff <= 0) forceReload = true;
            else el.innerText = formatTime(diff);
        });

        // Hero Timer
        const heroTimer = document.getElementById('hero-timer');
        if (heroTimer.dataset.target) {
            const target = new Date(heroTimer.dataset.target);
            const diff = target - now;
            if (diff <= 0) forceReload = true;
            else {
                document.getElementById('hero-countdown').innerText = formatTime(diff);
                const heroTitle = document.getElementById('hero-subject').innerText;
                checkNotification(target, heroTitle);
            }
        }

        // If a class just passed, drop it from the DOM
        if (forceReload) render(); 
    }

    function formatTime(ms) {
        const h = Math.floor((ms % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const m = Math.floor((ms % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((ms % (1000 * 60)) / 1000);
        return `${h}h ${m}m ${s}s`;
    }

    // --- 5. NOTIFICATIONS ---
    if (Notification.permission !== "granted" && Notification.permission !== "denied") {
        document.getElementById('notification-req').style.display = 'block';
    }

    window.requestNotificationPermission = function() {
        Notification.requestPermission().then(permission => {
            if (permission === "granted") {
                document.getElementById('notification-req').style.display = 'none';
                new Notification("Class Alerts Enabled", { body: "You will be pinged 30 mins before class." });
            }
        });
    }

    let notifiedClasses = JSON.parse(localStorage.getItem('notifiedClasses')) || [];

    function checkNotification(classDate, courseCode) {
        if (Notification.permission !== "granted") return;
        const now = new Date();
        const diffMins = (classDate - now) / (1000 * 60);

        if (diffMins <= 30 && diffMins > 29.8) {
            const notificationId = `${courseCode}-${classDate.getTime()}`;
            if (!notifiedClasses.includes(notificationId)) {
                new Notification(`Class in 30 Minutes!`, {
                    body: `Get ready for ${courseCode}.`,
                });
                notifiedClasses.push(notificationId);
                if (notifiedClasses.length > 20) notifiedClasses.shift();
                localStorage.setItem('notifiedClasses', JSON.stringify(notifiedClasses));
            }
        }
    }

    // Init
    render();
    setInterval(updateTimers, 1000);

    // Refresh every minute to check if day rolled over exactly at midnight
    setInterval(() => {
        const now = new Date();
        if (now.getHours() === 0 && now.getMinutes() === 0) {
            render();
        }
    }, 60000);
    // --- 6. WAKE UP FROM SLEEP FIX ---
    document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") {
            // The millisecond the user returns to the tab or unlocks their phone,
            // force the timers to update so they don't see a frozen clock.
            updateTimers();
        }
    });
    // --- 7. SERVICE WORKER REGISTRATION ---
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('SW registered:', reg.scope))
      .catch(err => console.warn('SW failed:', err));
  });
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00bcd4">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Routine</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --accent: #00bcd4;
            --danger: #ff5252;
            --success: #66bb6a;
            --ongoing: #ffa726;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        h1 { margin-bottom: 5px; text-align: center; }
        p.subtitle { color: #888; margin-bottom: 30px; font-style: italic; }

        /* Dropdown Styling */
        .controls { margin-bottom: 15px; }
        #day-selector {
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--accent);
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            outline: none;
            font-weight: bold;
        }

        /* The Big Countdown Timer */
        #hero-timer {
            background: linear-gradient(145deg, #252525, #1a1a1a);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            text-align: center;
            margin-bottom: 40px;
            width: 90%;
            max-width: 600px;
            border-left: 5px solid var(--accent);
            display: none; 
        }

        #hero-timer.ongoing {
            border-left-color: var(--ongoing);
        }
        #hero-timer.finished {
            border-left-color: #555;
            opacity: 0.7;
        }

        #hero-subject { font-size: 1.5rem; color: var(--accent); font-weight: bold; }
        .ongoing #hero-subject { color: var(--ongoing); }
        
        #hero-title { font-size: 1.2rem; color: #fff; margin-bottom: 10px; } 
        #hero-countdown { font-size: 3rem; margin: 10px 0; font-family: monospace; }
        #hero-date { color: #aaa; }

        /* Exam List Grid */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        .exam-card {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #333;
            position: relative;
        }

        .exam-card.ongoing { border-color: var(--ongoing); }
        .exam-card.finished { opacity: 0.5; border-color: #333; }

        .card-header { display: flex; justify-content: space-between; align-items: center; }
        .course-code { font-weight: bold; font-size: 1.2rem; color: var(--accent); }
        .ongoing .course-code { color: var(--ongoing); }
        
        .exam-title { font-size: 1.1rem; color: #fff; margin: 8px 0; font-weight: 500; }
        .exam-date { color: #888; font-size: 0.9rem; margin-bottom: 10px; }
        .time-remaining { color: #ddd; font-weight: 600; font-family: monospace; font-size: 1.1rem; }
        .ongoing .time-remaining { color: var(--ongoing); }
        
        .footer-note { margin-top: 50px; color: #555; font-size: 0.8rem; }
    </style>
</head>
<body>

    <h1>Class Routine</h1>
    
    <div class="controls">
        <select id="day-selector" onchange="handleDayChange()"></select>
    </div>

    <p class="subtitle" id="current-day-label">Loading schedule...</p>

    <div id="hero-timer">
        <div id="hero-header">NEXT CLASS</div>
        <div id="hero-subject">Loading...</div>
        <div id="hero-title"></div> 
        <div id="hero-countdown">00d 00h 00m 00s</div>
        <div id="hero-date">...</div>
    </div>

    <div class="grid-container" id="exam-grid"></div>

    <div class="footer-note">Strict Daily Routine Active</div>

<script>
    let routine = [];
    let currentDailyClasses = [];
    let selectedDayOverride = new Date().getDay(); 
    const daysMap = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];

    // Fetch the JSON file
    async function loadRoutine() {
        try {
            // Generate a unique timestamp right here in the app
            const cacheBuster = new Date().getTime();
            
            // Append it to the fetch request so it asks for a "new" file every time
            const response = await fetch(`routine.json?t=${cacheBuster}`);
            
            routine = await response.json();
            initDropdown();
            render();
            setInterval(updateTimers, 1000);
        } catch (error) {
            console.error('Error fetching routine:', error);
            document.getElementById('current-day-label').innerText = "Error loading routine.json.";
        }
    }

    // Build the dropdown dynamically so "Today" is always the first option
    function initDropdown() {
        const selector = document.getElementById('day-selector');
        const currentDay = new Date().getDay();
        
        for (let i = 0; i < 7; i++) {
            let targetDay = (currentDay + i) % 7;
            let option = document.createElement('option');
            option.value = targetDay;
            option.text = (i === 0) ? "Today" : daysMap[targetDay];
            selector.appendChild(option);
        }
    }

    function handleDayChange() {
        selectedDayOverride = parseInt(document.getElementById('day-selector').value);
        render();
        updateTimers();
    }

    // Process classes for the selected day, attaching full Date objects for Start and End
    function getSelectedDayClasses() {
        const now = new Date();
        const targetDay = selectedDayOverride;
        let occurrences = [];

        routine.forEach(cls => {
            if (cls.day === targetDay) {
                const [sHours, sMins] = cls.start.split(':').map(Number);
                const [eHours, eMins] = cls.end.split(':').map(Number);
                
                let startDate = new Date(now);
                let endDate = new Date(now);
                
                startDate.setHours(sHours, sMins, 0, 0);
                endDate.setHours(eHours, eMins, 0, 0);

                let daysAhead = targetDay - now.getDay();
                if (daysAhead < 0) daysAhead += 7; 

                startDate.setDate(now.getDate() + daysAhead);
                endDate.setDate(now.getDate() + daysAhead);

                occurrences.push({ ...cls, startDate, endDate });
            }
        });

        // Sort by start time
        return occurrences.sort((a, b) => a.startDate - b.startDate);
    }

    function render() {
        currentDailyClasses = getSelectedDayClasses();
        const grid = document.getElementById('exam-grid');
        grid.innerHTML = '';
        
        const now = new Date();
        const isToday = (selectedDayOverride === now.getDay());
        
        document.getElementById('current-day-label').innerText = isToday ? "Today's Schedule" : `${daysMap[selectedDayOverride]}'s Schedule`;

        const heroTimer = document.getElementById('hero-timer');
        heroTimer.style.display = "block";

        if (currentDailyClasses.length === 0) {
            setHeroState("IDLE", "Free Day", "No classes scheduled.", "- - -", "", "finished");
            heroTimer.removeAttribute('data-start');
            heroTimer.removeAttribute('data-end');
            return;
        }

        // Find the "Active" class to put in the hero section. 
        // This is the first class that has NOT ended yet.
        const activeClassIndex = currentDailyClasses.findIndex(cls => cls.endDate > now);
        
        if (activeClassIndex === -1) {
            setHeroState("STATUS: DONE", "All Clear", "Classes are finished for the day.", "00h 00m 00s", "", "finished");
            heroTimer.removeAttribute('data-start');
            heroTimer.removeAttribute('data-end');
        } else {
            const heroClass = currentDailyClasses[activeClassIndex];
            const timeOpts = { hour: '2-digit', minute:'2-digit' };
            const timeString = `${heroClass.startDate.toLocaleTimeString([], timeOpts)} - ${heroClass.endDate.toLocaleTimeString([], timeOpts)}`;

            heroTimer.dataset.start = heroClass.startDate;
            heroTimer.dataset.end = heroClass.endDate;
            
            document.getElementById('hero-subject').innerText = heroClass.code;
            document.getElementById('hero-title').innerText = `${heroClass.title} | ${heroClass.room}`;
            document.getElementById('hero-date').innerText = timeString;
        }

        // Render the grid
        currentDailyClasses.forEach(cls => {
            const timeOpts = { hour: '2-digit', minute:'2-digit' };
            const timeString = `${cls.startDate.toLocaleTimeString([], timeOpts)} - ${cls.endDate.toLocaleTimeString([], timeOpts)}`;
            
            const card = document.createElement('div');
            card.className = 'exam-card';
            card.innerHTML = `
                <div class="card-header"><span class="course-code">${cls.code}</span></div>
                <div class="exam-title">${cls.title}</div>
                <div class="exam-date">${timeString} | ${cls.room}</div>
                <div class="time-remaining" data-start="${cls.startDate}" data-end="${cls.endDate}">...</div>
            `;
            grid.appendChild(card);
        });

        // Run an immediate time update to style the newly rendered elements
        updateTimers();
    }

    function setHeroState(header, subject, title, countdown, dateText, className) {
        document.getElementById('hero-header').innerText = header;
        document.getElementById('hero-subject').innerText = subject;
        document.getElementById('hero-title').innerText = title;
        document.getElementById('hero-countdown').innerText = countdown;
        document.getElementById('hero-date').innerText = dateText;
        
        const heroTimer = document.getElementById('hero-timer');
        heroTimer.classList.remove('ongoing', 'finished');
        if (className) heroTimer.classList.add(className);
    }

    function updateTimers() {
        const now = new Date();
        let needsRender = false;

        // Update Grid Cards
        document.querySelectorAll('.time-remaining').forEach(el => {
            const start = new Date(el.dataset.start);
            const end = new Date(el.dataset.end);
            const card = el.closest('.exam-card');

            if (now < start) {
                el.innerText = `Starts in: ${formatTime(start - now)}`;
                card.classList.remove('ongoing', 'finished');
            } else if (now >= start && now < end) {
                el.innerText = `Class Started. Ends in: ${formatTime(end - now)}`;
                card.classList.add('ongoing');
                card.classList.remove('finished');
            } else {
                el.innerText = "Finished";
                card.classList.add('finished');
                card.classList.remove('ongoing');
                
                // If a class just ended, trigger a full re-render to update the Hero section
                if (now - end < 1500) needsRender = true; 
            }
        });

        // Update Hero Timer
        const heroTimer = document.getElementById('hero-timer');
        if (heroTimer.dataset.start && heroTimer.dataset.end) {
            const start = new Date(heroTimer.dataset.start);
            const end = new Date(heroTimer.dataset.end);

            if (now < start) {
                document.getElementById('hero-header').innerText = "UPCOMING CLASS";
                document.getElementById('hero-countdown').innerText = formatTime(start - now);
                heroTimer.classList.remove('ongoing', 'finished');
            } else if (now >= start && now < end) {
                document.getElementById('hero-header').innerText = "🔴 CLASS ONGOING";
                document.getElementById('hero-countdown').innerText = formatTime(end - now);
                heroTimer.classList.add('ongoing');
                heroTimer.classList.remove('finished');
            }
        }

        if (needsRender) render();
    }

    function formatTime(ms) {
        const d = Math.floor(ms / (1000 * 60 * 60 * 24));
        const h = Math.floor((ms % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const m = Math.floor((ms % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((ms % (1000 * 60)) / 1000);
        
        let out = "";
        if (d > 0) out += `${d}d `;
        if (h > 0 || d > 0) out += `${h}h `;
        out += `${m}m ${s}s`;
        return out;
    }

    // Initialize application
    loadRoutine();

</script>
</body>
</html>
